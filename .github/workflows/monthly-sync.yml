name: Sync UIL Solo Datasets

on:
  schedule:
    - cron: "0 12 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync UIL PML
        run: python3 scripts/sync_uil_pml.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          YEAR=$(python3 - <<'PY'
          import json
          from pathlib import Path
          stats = json.loads(Path("static/data/stats.json").read_text())
          print(stats["schoolYear"])
          PY
          )
          git add \
            data/public_domain_links.json \
            data/trumpet_public_domain_links.json \
            data/uil_piano_solos_source.csv \
            data/uil_french_horn_solos_source.csv \
            data/uil_trumpet_solos_source.csv \
            static/data/piano-solos.json \
            static/data/piano-stats.json \
            static/data/french-horn-solos.json \
            static/data/french-horn-stats.json \
            static/data/trumpet-solos.json \
            static/data/trumpet-stats.json \
            static/data/stats.json
          git commit -m "Sync UIL solo datasets for ${YEAR}"
          git push
